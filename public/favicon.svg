<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado con colores de marca -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Caja del regalo -->
  <rect x="7" y="18" width="18" height="9" rx="1.5" fill="white" opacity="0.95"/>

  <!-- Tapa del regalo -->
  <rect x="6" y="14" width="20" height="5" rx="1.5" fill="white"/>

  <!-- Lazo vertical (cinta) -->
  <rect x="14.5" y="14" width="3" height="13" fill="#ff6b35"/>

  <!-- Lazo izquierdo -->
  <ellipse cx="12.5" cy="13" rx="3.5" ry="2" fill="white" transform="rotate(-15 12.5 13)"/>

  <!-- Lazo derecho -->
  <ellipse cx="19.5" cy="13" rx="3.5" ry="2" fill="white" transform="rotate(15 19.5 13)"/>

  <!-- Nudo central del lazo -->
  <circle cx="16" cy="13" r="2" fill="white"/>
</svg>
